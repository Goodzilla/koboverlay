version: '3.8'

services:
  streampulse:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "4000:4000"
    environment:
      - PORT=4000
      - DATABASE_URL=file:./dev.db
      - NODE_ENV=production
    volumes:
      - streampulse_data:/app/server/prisma
    restart: unless-stopped

volumes:
  streampulse_data:
